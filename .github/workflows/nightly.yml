name: Nightly

on:
  schedule:
      # Nightly builds
      - cron:  0 0 * * *
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      buildNightly: ${{ steps.checkTag.outputs.GAFFER_NIGHTLY_BUILD }}

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0

    - name: Check Nightly
      id: checkTag
      run: |
        if ! gh release view nightly > /dev/null 2>&1; then
          echo "No release for tag 'nightly' found, skipping nightly build."
          exit
        fi

        if [ "$(git rev-parse HEAD)" = "$(git rev-list -n 1 tags/nightly)" ]; then
          echo "HEAD already matches current 'nightly' tag, skipping nightly build."
          exit
        fi

        for branch in $(git for-each-ref --sort=-committerdate --format='%(refname:short)' refs/heads | grep '_maintenance$' | head -n 2); do
          behind=$(git rev-list --count main..$branch)
          if [ $behind -gt 0 ]; then
            echo "main is $behind commits behind $branch, skipping nightly build."
            exit
          fi
        done

        echo GAFFER_NIGHTLY_BUILD=1 >> $GITHUB_OUTPUT
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: check
    uses: ./.github/workflows/main.yml
    with:
      buildType: 'nightly'
    if: needs.check.outputs.buildNightly == '1'

  tag:
    needs: [ check, build ]
    runs-on: ubuntu-latest
    if: needs.check.outputs.buildNightly == '1'

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0

    - name: Update Nightly Tag
      run: |
        git config user.name "${GITHUB_ACTOR}"
        git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
        git tag -fa nightly -m "nightly build"
        git push --force origin nightly
      shell: bash
